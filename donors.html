<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
window.addEventListener("load", () => {

    Papa.parse("donors.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,

        complete: function(results) {

            console.log("Headers:", results.meta.fields);
            console.log("Raw Data:", results.data);

            const donors = results.data.map(row => ({
                name: row["Name of the Student"] || "",
                regno: row["Student Register Number"] || "",
                department: row["Name of the Department"] || "",
                year: row["Year of study"] || "",
                phone: row["Contact Number"] || "",
                email: row["Mail ID"] || "",
                blood: row["Blood Group Type"] || ""
            }));

            console.log("Converted Donors:", donors);

            if (typeof displayDonors === "function") {
                displayDonors(donors);
            }
        },

        error: function(err) {
            console.error("CSV Error:", err);
        }
    });

});
</script>
