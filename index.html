<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEC NSS Blood Donor Portal</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <img src="college-logo.png" class="logo" alt="College Logo">

    <div class="title">
        <h1>Annapoorana Engineering College</h1>
        <h2>NSS Blood Donor Portal</h2>
    </div>

    <img src="nss-logo.png" class="logo" alt="NSS Logo">
</header>

<section class="hero">
    <h2>❤️ Donate Blood, Save Lives ❤️</h2>

    <select id="bloodGroup">
        <option value="">Select Blood Group</option>
        <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
        <option value="B-">B-</option>
        <option value="O+">O+</option>
        <option value="O-">O-</option>
        <option value="AB+">AB+</option>
        <option value="AB-">AB-</option>
    </select>

    <button onclick="showDonors()">Find Donors</button>
</section>

<div id="results"></div>

<footer>
    <button class="admin-btn"
            onclick="window.location.href='admin.html'">
        Admin Login
    </button>
</footer>

<!-- PapaParse Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<!-- App JS -->
<script src="app.js"></script>

</body>
</html>
