<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AEC NSS Blood Donor Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <img src="images/college-logo.png" class="logo">

    <div class="title">
        <h1>Annapoorana Engineering College</h1>
        <h2>NSS Blood Donor Portal</h2>
    </div>

    <img src="images/nss-logo.png" class="logo">
</header>

<section class="hero">
    <h2>❤️ Donate Blood, Save Lives ❤️</h2>

    <select id="bloodGroup">
        <option value="">Select Blood Group</option>
        <option>A+</option>

        <option>O+</option>
        <option>O-</option>
        <option>AB+</option>
        <option>AB-</option>

    <button onclick="showDonors()">Find Donors</button>

<div id="results"></div>

<footer>
    <a href="admin.html">Admin Login</a>
</footer>

<script src="js/app.js"></script>
